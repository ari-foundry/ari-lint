name: Check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check skeleton files
        run: |
          set -eu
          test -f README.md
          test -f AGENTS.md
          test -f docs/README.md
          test -f docs/migration.md
          test -f docs/dev/roadmap.md
          test -f docs/dev/ari-implementation-plan.md
          test -f docs/dev/parity-test-plan.md
          test -f docs/rules/trailing-whitespace.md
          test -f docs/rules/trailing-whitespace-fixtures.md
          test -f docs/rules/trailing-whitespace-parity.md
          test -f docs/rules/missing-final-newline.md
          test -f docs/rules/missing-final-newline-fixtures.md
          test -f tests/fixtures/trailing-whitespace/clean.ari
          test -f tests/fixtures/trailing-whitespace/trailing-spaces.ari
          test -f tests/fixtures/missing-final-newline/with-final-newline.ari
          test -f tests/fixtures/missing-final-newline/missing-final-newline.ari
          test -z "$(find tests/fixtures/trailing-whitespace -type f ! -name clean.ari ! -name trailing-spaces.ari -print -quit)"
          test -z "$(find tests/fixtures/missing-final-newline -type f ! -name with-final-newline.ari ! -name missing-final-newline.ari -print -quit)"
          ! grep -q '[[:blank:]]$' tests/fixtures/trailing-whitespace/clean.ari
          grep -q '[[:blank:]]$' tests/fixtures/trailing-whitespace/trailing-spaces.ari
          tail -c 1 tests/fixtures/missing-final-newline/with-final-newline.ari | od -An -t x1 | grep -q '0a'
          ! tail -c 1 tests/fixtures/missing-final-newline/missing-final-newline.ari | od -An -t x1 | grep -q '0a'
          test -z "$(find src -name README.md -print -quit)"
          test -z "$(find src -type f ! -name '*.ari' -print -quit)"
          test -f src/main.ari
          test -f src/model.ari
          test -f src/cli.ari
          test -f src/severity.ari
          test -f src/diagnostic.ari
          test -f src/output.ari
          test -f src/rule.ari
          test -f src/registry.ari
          test -f src/rules.ari
          test -f src/rules/trailing_whitespace.ari
          test -f src/rules/missing_final_newline.ari
          test -f src/config.ari
          test -f examples/README.md
          test -f tests/README.md
          test -f scripts/README.md
          test -f .github/workflows/check.yml
          grep -q "source extraction from ari-foundry/ari has not happened yet" README.md
          grep -q "https://github.com/ari-foundry/ari" README.md
          grep -q "https://github.com/ari-foundry/ari/releases" README.md
          grep -q "https://github.com/ari-foundry/ari/tags" README.md
          grep -q "https://ari-foundry.github.io" README.md
          grep -q "long-term implementation direction" README.md
          grep -q "Ari" README.md
          grep -q "docs/migration.md" docs/README.md
          grep -q "docs/dev/ari-implementation-plan.md" docs/README.md
          grep -q "docs/rules/trailing-whitespace.md" docs/README.md
          grep -q "docs/rules/missing-final-newline.md" docs/README.md
          grep -q "docs/dev/ari-implementation-plan.md" docs/dev/roadmap.md
          grep -q "docs/dev/parity-test-plan.md" docs/dev/roadmap.md
          grep -q "docs/dev/parity-test-plan.md" tests/README.md
          grep -q "Do not invent compatibility claims" docs/migration.md
          grep -q "Ari-language implementation" docs/dev/ari-implementation-plan.md
          grep -q "compiler bugs belong in ari-foundry/ari" docs/dev/ari-implementation-plan.md
          grep -q "standard library bugs belong in ari-foundry/ari" docs/dev/ari-implementation-plan.md
          grep -q "ari-lint Parity Test Plan" docs/dev/parity-test-plan.md
          grep -q "tools/lint" docs/dev/parity-test-plan.md
          grep -q "Do not add test fixtures in this step" docs/dev/parity-test-plan.md
          grep -q "# lint/trailing-whitespace" docs/rules/trailing-whitespace.md
          grep -q "Do not implement full trailing-whitespace rule execution in this step" docs/rules/trailing-whitespace.md
          grep -q "# lint/missing-final-newline" docs/rules/missing-final-newline.md
          grep -q "Do not implement missing-final-newline in this step" docs/rules/missing-final-newline.md
          grep -q "docs/rules/trailing-whitespace.md" docs/dev/ari-implementation-plan.md
          grep -q "docs/rules/missing-final-newline.md" docs/dev/ari-implementation-plan.md
          grep -q "docs/rules/trailing-whitespace.md" docs/dev/parity-test-plan.md
          grep -q "docs/rules/missing-final-newline.md" docs/dev/parity-test-plan.md
          grep -q "docs/rules/missing-final-newline-fixtures.md" docs/dev/parity-test-plan.md
          grep -q "docs/rules/trailing-whitespace-fixtures.md" docs/rules/trailing-whitespace.md
          grep -q "docs/rules/trailing-whitespace-fixtures.md" docs/dev/parity-test-plan.md
          grep -q "docs/rules/trailing-whitespace-fixtures.md" tests/README.md
          grep -q "docs/rules/missing-final-newline-fixtures.md" docs/rules/missing-final-newline.md
          grep -q "docs/rules/missing-final-newline-fixtures.md" tests/README.md
          grep -q "Do not add broad fixture coverage in this step" docs/rules/missing-final-newline-fixtures.md
          grep -q "docs/rules/trailing-whitespace-parity.md" docs/rules/trailing-whitespace.md
          grep -q "docs/rules/trailing-whitespace-parity.md" docs/rules/trailing-whitespace-fixtures.md
          grep -q "docs/rules/trailing-whitespace-parity.md" docs/dev/parity-test-plan.md
          grep -q "docs/rules/trailing-whitespace-parity.md" tests/README.md
          grep -q "Do not add a parity runner in this step" docs/rules/trailing-whitespace-parity.md
          grep -q "parity plan exists but runner is not implemented" docs/rules/trailing-whitespace.md
          grep -q "Fixture comparison is planned but not automated yet" docs/rules/trailing-whitespace-fixtures.md
          grep -q "No parity runner exists yet" tests/README.md
          grep -q "first minimal fixture coverage has started" docs/rules/trailing-whitespace-fixtures.md
          grep -q "initial clean and trailing-spaces fixtures are started" docs/rules/trailing-whitespace.md
          grep -q "trailing-whitespace design note" docs/dev/roadmap.md
          grep -q "trailing-whitespace fixture and test plan" docs/dev/roadmap.md
          grep -q "initial trailing-whitespace fixtures and lightweight fixture check" docs/dev/roadmap.md
          grep -q "trailing-whitespace parity plan added" docs/dev/roadmap.md
          grep -q "missing-final-newline design note added" docs/dev/roadmap.md
          grep -q "minimal missing-final-newline helper started" docs/dev/roadmap.md
          grep -q "missing-final-newline fixture and test plan added" docs/dev/roadmap.md
          grep -q "missing-final-newline fixtures and lightweight fixture check started" docs/dev/roadmap.md
          grep -q "Initial trailing-whitespace fixtures have started" tests/README.md
          grep -q "Initial missing-final-newline fixtures have started" tests/README.md
          grep -q "No executable missing-final-newline helper tests are added yet" tests/README.md
          grep -q "Source directories should contain Ari source files only" docs/dev/ari-implementation-plan.md
          grep -q "These files do not implement real lint rules" docs/dev/ari-implementation-plan.md
          grep -q "registry, severity, and config model skeleton" docs/dev/ari-implementation-plan.md
          grep -q "registry, severity, and config skeleton" docs/dev/roadmap.md
          grep -q "first planned rule metadata entries" docs/dev/ari-implementation-plan.md
          grep -q "first planned rule metadata entries" docs/dev/roadmap.md
          grep -q "No rule metadata tests are added yet" tests/README.md
          grep -q "CLI metadata skeleton" docs/dev/ari-implementation-plan.md
          grep -q "CLI metadata skeleton" docs/dev/roadmap.md
          grep -q "real CLI parsing" docs/dev/ari-implementation-plan.md
          grep -q "No CLI tests are added yet" tests/README.md
          grep -q "diagnostic output metadata skeleton" docs/dev/ari-implementation-plan.md
          grep -q "diagnostic output metadata skeleton" docs/dev/roadmap.md
          grep -q "Diagnostic output is not implemented yet" docs/dev/ari-implementation-plan.md
          grep -q "JSON serialization is not implemented yet" docs/dev/ari-implementation-plan.md
          grep -q "No diagnostic output tests are added yet" tests/README.md
          grep -q "config override skeleton" docs/dev/ari-implementation-plan.md
          grep -q "config override skeleton" docs/dev/roadmap.md
          grep -q "Config parsing is not implemented yet" docs/dev/ari-implementation-plan.md
          grep -q "ari-lint.rules.*not parsed yet" docs/dev/ari-implementation-plan.md
          grep -q "No config override tests are added yet" tests/README.md
          grep -q "non-executing rule module layout" docs/dev/ari-implementation-plan.md
          grep -q "rule module layout" docs/dev/roadmap.md
          grep -q "full rule behavior is not implemented" docs/dev/ari-implementation-plan.md
          grep -q "No rule module tests are added yet" tests/README.md
          grep -q "minimal internal single-line helper" docs/dev/ari-implementation-plan.md
          grep -q "single-line helper" docs/rules/trailing-whitespace.md
          grep -q "trailing-whitespace helper started" docs/dev/roadmap.md
          grep -q "No executable trailing-whitespace helper tests are added yet" tests/README.md
          grep -q "fn main() -> i64" src/main.ari
          grep -q "pub mod cli" src/model.ari
          grep -q "pub mod output" src/model.ari
          grep -q "pub mod config" src/model.ari
          grep -q "CliSurfaceMetadata" src/cli.ari
          grep -q "positional source file input" src/cli.ari
          grep -q -- "--json" src/cli.ari
          grep -q -- "--ari" src/cli.ari
          grep -q -- "-I" src/cli.ari
          grep -q -- "--list-rules" src/cli.ari
          grep -q -- "--config" src/cli.ari
          grep -q -- "--rule" src/cli.ari
          grep -q "does not parse arguments" src/cli.ari
          grep -q "future work" src/cli.ari
          grep -q "DiagnosticOutputMetadata" src/output.ari
          grep -q "Human" src/output.ari
          grep -q "Json" src/output.ari
          grep -q "file path" src/output.ari
          grep -q "line" src/output.ari
          grep -q "column" src/output.ari
          grep -q "endLine" src/output.ari
          grep -q "endColumn" src/output.ari
          grep -q "severity" src/output.ari
          grep -q "rule code" src/output.ari
          grep -q "message" src/output.ari
          grep -q "does not format" src/output.ari
          grep -q "JSON schema stability remain follow-up" src/output.ari
          grep -q "ConfigSkeleton" src/config.ari
          grep -q "ConfigSourceMetadata" src/config.ari
          grep -q "OverridePrecedenceMetadata" src/config.ari
          grep -q "DefaultConfig" src/config.ari
          grep -q "AriLintRulesDiscovery" src/config.ari
          grep -q "ExplicitConfigFile" src/config.ari
          grep -q "CommandLineRuleOverride" src/config.ari
          grep -q "ari-lint.rules" src/config.ari
          grep -q -- "--config" src/config.ari
          grep -q -- "--rule" src/config.ari
          grep -q "does not parse ari-lint.rules" src/config.ari
          grep -q "future work" src/config.ari
          grep -q "InitialRuleMetadata" src/rules.ari
          grep -q "pub mod trailing_whitespace" src/rules.ari
          grep -q "pub mod missing_final_newline" src/rules.ari
          grep -q "lint/trailing-whitespace" src/rules.ari
          grep -q "trailing-whitespace" src/rules.ari
          grep -q "lint/missing-final-newline" src/rules.ari
          grep -q "missing-final-newline" src/rules.ari
          grep -q "default severity warning" src/rules.ari
          grep -q "future work" src/rules.ari
          grep -q "does not run rules" src/rules.ari
          grep -q "TrailingWhitespaceRuleModuleMetadata" src/rules/trailing_whitespace.ari
          grep -q "lint/trailing-whitespace" src/rules/trailing_whitespace.ari
          grep -q "line_has_trailing_whitespace" src/rules/trailing_whitespace.ari
          grep -q "is_trailing_space_byte" src/rules/trailing_whitespace.ari
          grep -q "TrailingWhitespaceDiagnosticMapping" src/rules/trailing_whitespace.ari
          grep -q "trailing_whitespace_diagnostic_mapping" src/rules/trailing_whitespace.ari
          grep -q "source_span_with_end" src/diagnostic.ari
          grep -q "diagnostic mapping skeleton" docs/dev/ari-implementation-plan.md
          grep -q "diagnostic mapping skeleton" docs/dev/roadmap.md
          grep -q "No diagnostic mapping tests are added yet" tests/README.md
          grep -q "does not read files" src/rules/trailing_whitespace.ari
          grep -q "whole source" src/rules/trailing_whitespace.ari
          grep -q "future work" src/rules/trailing_whitespace.ari
          grep -q "MissingFinalNewlineRuleModuleMetadata" src/rules/missing_final_newline.ari
          grep -q "lint/missing-final-newline" src/rules/missing_final_newline.ari
          grep -q "content_is_missing_final_newline" src/rules/missing_final_newline.ari
          grep -q "MissingFinalNewlineDiagnosticMapping" src/rules/missing_final_newline.ari
          grep -q "missing_final_newline_diagnostic_mapping" src/rules/missing_final_newline.ari
          grep -q "source_span_with_end" src/rules/missing_final_newline.ari
          grep -q "explicit caller-provided final position" docs/dev/ari-implementation-plan.md
          grep -q "missing-final-newline diagnostic mapping skeleton started" docs/dev/roadmap.md
          grep -q "No missing-final-newline diagnostic mapping tests are added yet" tests/README.md
          grep -q "does not read files" src/rules/missing_final_newline.ari
          grep -q "does not" src/rules/missing_final_newline.ari
