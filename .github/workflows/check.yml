name: Check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check skeleton files
        run: |
          set -eu
          test -f README.md
          test -f AGENTS.md
          test -f docs/README.md
          test -f docs/migration.md
          test -f docs/dev/roadmap.md
          test -f docs/dev/ari-implementation-plan.md
          test -f docs/dev/parity-test-plan.md
          test -z "$(find src -type f ! -name '*.ari' -print -quit)"
          test -f src/main.ari
          test -f src/model.ari
          test -f src/severity.ari
          test -f src/diagnostic.ari
          test -f src/rule.ari
          test -f src/registry.ari
          test -f src/config.ari
          test -f examples/README.md
          test -f tests/README.md
          test -f scripts/README.md
          test -f .github/workflows/check.yml
          grep -q "source extraction from ari-foundry/ari has not happened yet" README.md
          grep -q "https://github.com/ari-foundry/ari" README.md
          grep -q "https://github.com/ari-foundry/ari/releases" README.md
          grep -q "https://github.com/ari-foundry/ari/tags" README.md
          grep -q "https://ari-foundry.github.io" README.md
          grep -q "long-term implementation direction" README.md
          grep -q "Ari" README.md
          grep -q "docs/migration.md" docs/README.md
          grep -q "docs/dev/ari-implementation-plan.md" docs/README.md
          grep -q "docs/dev/ari-implementation-plan.md" docs/dev/roadmap.md
          grep -q "docs/dev/parity-test-plan.md" docs/dev/roadmap.md
          grep -q "docs/dev/parity-test-plan.md" tests/README.md
          grep -q "Do not invent compatibility claims" docs/migration.md
          grep -q "Ari-language implementation" docs/dev/ari-implementation-plan.md
          grep -q "compiler bugs belong in ari-foundry/ari" docs/dev/ari-implementation-plan.md
          grep -q "standard library bugs belong in ari-foundry/ari" docs/dev/ari-implementation-plan.md
          grep -q "ari-lint Parity Test Plan" docs/dev/parity-test-plan.md
          grep -q "tools/lint" docs/dev/parity-test-plan.md
          grep -q "Do not add test fixtures in this step" docs/dev/parity-test-plan.md
          grep -q "Source directories should contain Ari source files only" docs/dev/ari-implementation-plan.md
          grep -q "These files do not implement real lint rules" docs/dev/ari-implementation-plan.md
          grep -q "registry, severity, and config model skeleton" docs/dev/ari-implementation-plan.md
          grep -q "registry, severity, and config skeleton" docs/dev/roadmap.md
          grep -q "fn main() -> i64" src/main.ari
          ! grep -q "trailing-whitespace" src/main.ari
          ! grep -q "missing-final-newline" src/main.ari
